<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Eventize - Détails de l'événement</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            :root {
                --navy: #0f172a;
                --navy-light: #1e293b;
                --gold: #c8a882;
                --cream: #faf8f5;
                --gray: #64748b;
                --white: #ffffff;
            }

            body {
                font-family: "Inter", sans-serif;
                background: var(--cream);
                color: var(--navy);
                line-height: 1.6;
            }

            /* Navigation */
            .navbar {
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(10px);
                padding: 1.5rem 0;
                box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
                position: fixed;
                width: 100%;
                top: 0;
                z-index: 1000;
            }

            .nav-container {
                max-width: 1400px;
                margin: 0 auto;
                padding: 0 2rem;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .logo-container {
                display: flex;
                align-items: center;
                gap: 0.75rem;
                text-decoration: none;
            }

            .logo-svg {
                width: 42px;
                height: 42px;
            }

            .logo-text {
                font-family: "Playfair Display", serif;
                font-size: 1.75rem;
                font-weight: 700;
                color: var(--navy);
                letter-spacing: -0.5px;
            }

            .nav-links {
                display: flex;
                gap: 2rem;
                align-items: center;
            }

            .nav-link {
                color: var(--gray);
                text-decoration: none;
                font-weight: 500;
                font-size: 0.95rem;
                transition: color 0.3s;
            }

            .nav-link:hover {
                color: var(--navy);
            }

            .nav-btn {
                padding: 0.6rem 1.5rem;
                background: var(--navy);
                color: var(--white);
                text-decoration: none;
                border-radius: 8px;
                font-weight: 500;
                font-size: 0.95rem;
                transition: all 0.3s;
            }

            .nav-btn:hover {
                background: var(--navy-light);
                transform: translateY(-2px);
            }

            /* Main Content */
            .container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 0 2rem;
            }

            .page-content {
                margin-top: 90px;
                padding: 3rem 0;
            }

            .back-link {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                margin-bottom: 2rem;
                color: var(--navy);
                text-decoration: none;
                font-weight: 500;
                transition: color 0.3s;
            }

            .back-link:hover {
                color: var(--gold);
            }

            /* Hero Image Section */
            .event-hero {
                width: 100%;
                height: 400px;
                border-radius: 16px;
                overflow: hidden;
                margin-bottom: 3rem;
                box-shadow: 0 20px 60px rgba(15, 23, 42, 0.15);
                position: relative;
            }

            .event-hero img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .event-hero-placeholder {
                width: 100%;
                height: 100%;
                background: linear-gradient(
                    135deg,
                    var(--navy) 0%,
                    var(--navy-light) 100%
                );
                display: flex;
                align-items: center;
                justify-content: center;
            }

            /* Content Layout */
            .event-layout {
                display: grid;
                grid-template-columns: 2fr 1fr;
                gap: 2rem;
                align-items: start;
            }

            @media (max-width: 968px) {
                .event-layout {
                    grid-template-columns: 1fr;
                }
            }

            /* Event Details Card */
            .event-detail {
                background: var(--white);
                border-radius: 16px;
                overflow: hidden;
                box-shadow: 0 4px 20px rgba(15, 23, 42, 0.08);
            }

            .event-content {
                padding: 2.5rem;
            }

            .event-title {
                font-family: "Playfair Display", serif;
                font-size: 2.5rem;
                margin-bottom: 1.5rem;
                color: var(--navy);
                font-weight: 700;
                line-height: 1.2;
            }

            .event-meta {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 1.25rem;
                margin-bottom: 2rem;
                padding-bottom: 2rem;
                border-bottom: 1px solid rgba(15, 23, 42, 0.08);
            }

            .meta-item {
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
            }

            .meta-label {
                font-weight: 600;
                color: var(--gray);
                font-size: 0.875rem;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .meta-value {
                color: var(--navy);
                font-weight: 500;
                font-size: 1.05rem;
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }

            .meta-icon {
                color: var(--gold);
            }

            .event-description {
                color: var(--gray);
                line-height: 1.8;
                font-size: 1.05rem;
            }

            /* Reservation Form Card */
            .reservation-form {
                background: var(--white);
                border-radius: 16px;
                padding: 2.5rem;
                box-shadow: 0 4px 20px rgba(15, 23, 42, 0.08);
                backdrop-filter: blur(10px);
                position: sticky;
                top: 110px;
            }

            .form-title {
                font-family: "Playfair Display", serif;
                font-size: 1.75rem;
                margin-bottom: 1.5rem;
                color: var(--navy);
                font-weight: 600;
            }

            .form-group {
                margin-bottom: 1.5rem;
            }

            .form-label {
                display: block;
                margin-bottom: 0.5rem;
                font-weight: 500;
                color: var(--navy);
                font-size: 0.95rem;
            }

            .form-input {
                width: 100%;
                padding: 0.875rem 1rem;
                border: 1px solid rgba(15, 23, 42, 0.1);
                border-radius: 8px;
                font-size: 1rem;
                font-family: "Inter", sans-serif;
                transition: all 0.3s;
                background: var(--white);
            }

            .form-input:focus {
                outline: none;
                border-color: var(--gold);
                box-shadow: 0 0 0 3px rgba(200, 168, 130, 0.1);
            }

            .btn {
                width: 100%;
                padding: 1rem 1.5rem;
                background: var(--navy);
                color: var(--white);
                text-decoration: none;
                border: none;
                border-radius: 8px;
                font-size: 1rem;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s ease;
            }

            .btn:hover {
                background: var(--navy-light);
                transform: translateY(-2px);
                box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2);
            }

            .btn:disabled {
                background: var(--gray);
                cursor: not-allowed;
                transform: none;
                opacity: 0.6;
            }

            .loading {
                text-align: center;
                padding: 4rem 2rem;
                font-size: 1.2rem;
                color: var(--gray);
            }

            .error {
                background: rgba(220, 53, 69, 0.1);
                color: #dc3545;
                padding: 1rem 1.5rem;
                border-radius: 12px;
                margin: 1rem 0;
                font-weight: 500;
            }

            .success {
                background: rgba(40, 167, 69, 0.1);
                color: #28a745;
                padding: 1.5rem;
                border-radius: 12px;
                margin: 1rem 0;
                font-weight: 500;
                line-height: 1.6;
            }

            .no-seats {
                background: rgba(255, 193, 7, 0.1);
                color: #856404;
                padding: 1.25rem;
                border-radius: 12px;
                margin-bottom: 1.5rem;
                font-weight: 500;
            }

            .seats-badge {
                display: inline-block;
                background: rgba(200, 168, 130, 0.15);
                color: var(--gold);
                padding: 0.5rem 1rem;
                border-radius: 8px;
                font-size: 0.95rem;
                font-weight: 600;
            }
        </style>
    </head>
    <body>
        <!-- Navigation -->
        <nav class="navbar">
            <div class="nav-container">
                <a href="index.html" class="logo-container">
                    <svg
                        class="logo-svg"
                        viewBox="0 0 24 24"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                    >
                        <path
                            d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"
                            fill="#c8a882"
                            stroke="#c8a882"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        />
                    </svg>
                    <span class="logo-text">Eventize</span>
                </a>
                <div class="nav-links">
                    <a href="index.html" class="nav-link">Events</a>
                    <a href="login.html" class="nav-btn">Login</a>
                </div>
            </div>
        </nav>

        <main class="container page-content">
            <a href="index.html" class="back-link">
                <svg
                    width="20"
                    height="20"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                >
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
                Retour aux événements
            </a>

            <div id="loading" class="loading">Chargement de l'événement...</div>
            <div id="error" class="error" style="display: none"></div>

            <div id="event-container" style="display: none">
                <!-- Hero Image -->
                <div class="event-hero" id="event-hero">
                    <div class="event-hero-placeholder"></div>
                </div>

                <!-- Event Layout -->
                <div class="event-layout">
                    <!-- Event Details -->
                    <div class="event-detail">
                        <div class="event-content">
                            <h1 class="event-title" id="event-title"></h1>
                            <div class="event-meta">
                                <div class="meta-item">
                                    <div class="meta-label">Date</div>
                                    <div class="meta-value">
                                        <svg
                                            class="meta-icon"
                                            width="20"
                                            height="20"
                                            viewBox="0 0 24 24"
                                            fill="none"
                                            stroke="currentColor"
                                            stroke-width="2"
                                        >
                                            <rect
                                                x="3"
                                                y="4"
                                                width="18"
                                                height="18"
                                                rx="2"
                                                ry="2"
                                            ></rect>
                                            <line
                                                x1="16"
                                                y1="2"
                                                x2="16"
                                                y2="6"
                                            ></line>
                                            <line
                                                x1="8"
                                                y1="2"
                                                x2="8"
                                                y2="6"
                                            ></line>
                                            <line
                                                x1="3"
                                                y1="10"
                                                x2="21"
                                                y2="10"
                                            ></line>
                                        </svg>
                                        <span id="event-date"></span>
                                    </div>
                                </div>
                                <div class="meta-item">
                                    <div class="meta-label">Lieu</div>
                                    <div class="meta-value">
                                        <svg
                                            class="meta-icon"
                                            width="20"
                                            height="20"
                                            viewBox="0 0 24 24"
                                            fill="none"
                                            stroke="currentColor"
                                            stroke-width="2"
                                        >
                                            <path
                                                d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"
                                            ></path>
                                            <circle
                                                cx="12"
                                                cy="10"
                                                r="3"
                                            ></circle>
                                        </svg>
                                        <span id="event-location"></span>
                                    </div>
                                </div>
                                <div class="meta-item">
                                    <div class="meta-label">
                                        Places disponibles
                                    </div>
                                    <div class="meta-value">
                                        <span
                                            class="seats-badge"
                                            id="event-seats"
                                        ></span>
                                    </div>
                                </div>
                            </div>
                            <div
                                class="event-description"
                                id="event-description"
                            ></div>
                        </div>
                    </div>

                    <!-- Reservation Form -->
                    <div class="reservation-form">
                        <h3 class="form-title">Réserver une place</h3>
                        <div
                            id="no-seats-message"
                            class="no-seats"
                            style="display: none"
                        >
                            Désolé, il n'y a plus de places disponibles pour cet
                            événement.
                        </div>
                        <form id="reservation-form">
                            <div class="form-group">
                                <label class="form-label" for="name"
                                    >Nom complet *</label
                                >
                                <input
                                    type="text"
                                    id="name"
                                    name="name"
                                    class="form-input"
                                    required
                                />
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="email"
                                    >Email *</label
                                >
                                <input
                                    type="email"
                                    id="email"
                                    name="email"
                                    class="form-input"
                                    required
                                />
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="phone"
                                    >Téléphone *</label
                                >
                                <input
                                    type="tel"
                                    id="phone"
                                    name="phone"
                                    class="form-input"
                                    required
                                />
                            </div>
                            <button type="submit" class="btn" id="submit-btn">
                                Confirmer la réservation
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </main>

        <script>
            let currentEvent = null;

            async function loadEvent() {
                const urlParams = new URLSearchParams(window.location.search);
                const eventId = urlParams.get("id");

                if (!eventId) {
                    showError("ID d'événement manquant");
                    return;
                }

                try {
                    const response = await fetch(`/api/events/${eventId}`);

                    if (!response.ok) {
                        throw new Error("Événement non trouvé");
                    }

                    const event = await response.json();
                    currentEvent = event;
                    displayEvent(event);
                } catch (error) {
                    console.error("Error:", error);
                    showError(error.message);
                }
            }

            function displayEvent(event) {
                document.getElementById("loading").style.display = "none";
                document.getElementById("event-container").style.display =
                    "block";

                document.getElementById("event-title").textContent =
                    event.title;
                document.getElementById("event-date").textContent = new Date(
                    event.date,
                ).toLocaleDateString("fr-FR", {
                    day: "numeric",
                    month: "long",
                    year: "numeric",
                    hour: "2-digit",
                    minute: "2-digit",
                });
                document.getElementById("event-location").textContent =
                    event.location;
                document.getElementById("event-seats").textContent =
                    `${event.availableSeats} place${event.availableSeats > 1 ? "s" : ""}`;
                document.getElementById("event-description").textContent =
                    event.description;

                // Handle hero image with Unsplash fallback
                const heroElement = document.getElementById("event-hero");
                const imageUrl = event.image || "https://source.unsplash.com/1200x600/?event,conference";
                
                heroElement.innerHTML = `<img src="${imageUrl}" alt="${event.title}" onerror="this.src='https://source.unsplash.com/1200x600/?event,conference'">`;

                // Disable form if no seats available
                if (event.availableSeats <= 0) {
                    document.getElementById("no-seats-message").style.display =
                        "block";
                    document.getElementById("reservation-form").style.display =
                        "none";
                }
            }

            async function submitReservation(e) {
                e.preventDefault();

                const formData = new FormData(e.target);
                const data = {
                    name: formData.get("name"),
                    email: formData.get("email"),
                    phone: formData.get("phone"),
                };

                const submitBtn = document.getElementById("submit-btn");
                submitBtn.disabled = true;
                submitBtn.textContent = "Réservation en cours...";

                try {
                    const response = await fetch(
                        `/api/events/${currentEvent.id}/reservations`,
                        {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify(data),
                        },
                    );

                    const result = await response.json();

                    if (!response.ok) {
                        throw new Error(
                            result.error || "Erreur lors de la réservation",
                        );
                    }

                    // Show success message
                    const successDiv = document.createElement("div");
                    successDiv.className = "success";
                    successDiv.textContent =
                        "Votre réservation a été confirmée ! Un email de confirmation vous a été envoyé.";

                    document.querySelector(".reservation-form").innerHTML = "";
                    document
                        .querySelector(".reservation-form")
                        .appendChild(successDiv);
                } catch (error) {
                    console.error("Error:", error);
                    showError(error.message);
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Confirmer la réservation";
                }
            }

            function showError(message) {
                document.getElementById("loading").style.display = "none";
                document.getElementById("error").style.display = "block";
                document.getElementById("error").textContent = message;
            }

            // Initialize
            document.addEventListener("DOMContentLoaded", () => {
                loadEvent();
                document
                    .getElementById("reservation-form")
                    .addEventListener("submit", submitReservation);
            });
        </script>
    </body>
</html>
