<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Eventize - Administration</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            :root {
                --navy: #0f172a;
                --navy-light: #1e293b;
                --navy-lighter: #334155;
                --gold: #c8a882;
                --cream: #faf8f5;
                --gray: #64748b;
                --gray-light: #94a3b8;
                --white: #ffffff;
                --success: #10b981;
                --danger: #ef4444;
                --warning: #f59e0b;
                --teal: #4a9b7f;
            }

            body {
                font-family: "Inter", sans-serif;
                line-height: 1.6;
                color: var(--navy);
                background: linear-gradient(135deg, #f8fafb 0%, #f1f5f9 100%);
                min-height: 100vh;
            }

            h1,
            h2,
            h3,
            h4,
            h5,
            h6 {
                font-family: "Playfair Display", serif;
            }

            /* ===== NAVBAR ===== */
            .navbar {
                background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
                padding: 1.5rem 2rem;
                position: sticky;
                top: 0;
                z-index: 1000;
                box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
            }

            .navbar-container {
                max-width: 1400px;
                margin: 0 auto;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .navbar-logo {
                display: flex;
                align-items: center;
                gap: 0.75rem;
                text-decoration: none;
                transition: transform 0.3s ease;
            }

            .navbar-logo:hover {
                transform: scale(1.05);
            }

            .logo-text {
                font-family: "Playfair Display", serif;
                font-size: 1.5rem;
                font-weight: 700;
                color: var(--white);
                letter-spacing: 1px;
            }

            .navbar-actions {
                display: flex;
                align-items: center;
                gap: 1.5rem;
            }

            .user-info {
                color: rgba(255, 255, 255, 0.8);
                font-size: 0.9rem;
                padding: 0.5rem 1rem;
                background: rgba(255, 255, 255, 0.1);
                border-radius: 8px;
            }

            /* ===== CONTAINER ===== */
            .container {
                max-width: 1400px;
                margin: 0 auto;
                padding: 2rem;
            }

            /* ===== DASHBOARD HEADER ===== */
            .dashboard-header {
                margin-bottom: 3rem;
                padding-bottom: 2rem;
                border-bottom: 2px solid rgba(200, 168, 130, 0.2);
            }

            .dashboard-header h1 {
                font-size: 2.5rem;
                color: var(--navy);
                margin-bottom: 0.5rem;
                display: flex;
                align-items: center;
                gap: 1rem;
            }

            .dashboard-header p {
                color: var(--gray);
                font-size: 1.125rem;
            }

            /* ===== TABS ===== */
            .tabs-container {
                display: flex;
                gap: 1rem;
                margin-bottom: 2rem;
                flex-wrap: wrap;
            }

            .tab-btn {
                padding: 0.75rem 1.5rem;
                background: var(--white);
                color: var(--gray);
                border: 2px solid #e2e8f0;
                border-radius: 10px;
                cursor: pointer;
                font-weight: 500;
                transition: all 0.3s ease;
                font-family: "Inter", sans-serif;
                font-size: 0.95rem;
            }

            .tab-btn:hover {
                border-color: var(--gold);
                color: var(--navy);
            }

            .tab-btn.active {
                background: linear-gradient(
                    135deg,
                    var(--navy) 0%,
                    var(--navy-light) 100%
                );
                color: var(--white);
                border-color: var(--navy);
                box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2);
            }

            .tab-content {
                display: none;
            }

            .tab-content.active {
                display: block;
            }

            /* ===== BUTTONS ===== */
            .btn {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.75rem 1.5rem;
                background: var(--gold);
                color: var(--white);
                text-decoration: none;
                border: none;
                border-radius: 8px;
                font-weight: 500;
                cursor: pointer;
                transition: all 0.3s ease;
                font-family: "Inter", sans-serif;
                font-size: 0.9375rem;
            }

            .btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 16px rgba(200, 168, 130, 0.3);
            }

            .btn-primary {
                background: linear-gradient(
                    135deg,
                    var(--navy) 0%,
                    var(--navy-light) 100%
                );
                color: var(--white);
            }

            .btn-primary:hover {
                box-shadow: 0 6px 16px rgba(15, 23, 42, 0.3);
            }

            .btn-danger {
                background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
                color: var(--white);
            }

            .btn-danger:hover {
                box-shadow: 0 6px 16px rgba(239, 68, 68, 0.3);
            }

            .btn-secondary {
                background: rgba(100, 116, 139, 0.1);
                color: var(--gray);
                border: 1px solid #e2e8f0;
            }

            .btn-secondary:hover {
                background: rgba(100, 116, 139, 0.2);
            }

            .btn-small {
                padding: 0.5rem 1rem;
                font-size: 0.875rem;
            }

            .btn-icon-only {
                padding: 0.5rem;
                border-radius: 6px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                font-size: 1.2rem;
                background: transparent;
                border: none;
                transition: all 0.2s ease;
            }

            .btn-icon-only:hover {
                transform: scale(1.2);
            }

            /* ===== CARDS ===== */
            .card {
                background: var(--white);
                border-radius: 16px;
                padding: 2rem;
                margin-bottom: 2rem;
                box-shadow: 0 2px 12px rgba(15, 23, 42, 0.06);
                border: 1px solid rgba(15, 23, 42, 0.05);
                transition: all 0.3s ease;
            }

            .card:hover {
                box-shadow: 0 8px 24px rgba(15, 23, 42, 0.1);
            }

            .card-header {
                display: flex;
                align-items: center;
                gap: 1rem;
                margin-bottom: 1.5rem;
                padding-bottom: 1.5rem;
                border-bottom: 2px solid rgba(200, 168, 130, 0.1);
            }

            .card-icon {
                font-size: 2rem;
            }

            .card h2 {
                font-size: 1.75rem;
                color: var(--navy);
                margin: 0;
            }

            .card h3 {
                font-size: 1.25rem;
                color: var(--navy);
                margin-bottom: 1rem;
            }

            /* ===== FORM ===== */
            .form-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 1.5rem;
                margin-bottom: 1.5rem;
            }

            .form-group {
                margin-bottom: 1.5rem;
            }

            .form-label {
                display: block;
                margin-bottom: 0.5rem;
                font-weight: 600;
                color: var(--navy);
                font-size: 0.9375rem;
            }

            .form-input {
                width: 100%;
                padding: 0.875rem;
                border: 2px solid #e2e8f0;
                border-radius: 8px;
                font-size: 1rem;
                font-family: "Inter", sans-serif;
                transition: all 0.3s ease;
                background: var(--white);
            }

            .form-input:focus {
                outline: none;
                border-color: var(--gold);
                box-shadow: 0 0 0 3px rgba(200, 168, 130, 0.1);
            }

            textarea.form-input {
                resize: vertical;
                min-height: 100px;
            }

            /* ===== TABLES ===== */
            .table-responsive {
                overflow-x: auto;
                border-radius: 12px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            }

            .events-table,
            .participants-table table {
                width: 100%;
                border-collapse: collapse;
            }

            .events-table th,
            .participants-table th,
            .events-table td,
            .participants-table td {
                padding: 1.25rem;
                text-align: left;
            }

            .events-table th,
            .participants-table th {
                background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
                font-weight: 600;
                color: var(--navy);
                font-size: 0.875rem;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                border-bottom: 2px solid #e2e8f0;
            }

            .events-table tbody tr,
            .participants-table tbody tr {
                border-bottom: 1px solid #e2e8f0;
                transition: all 0.2s ease;
            }

            .events-table tbody tr:hover,
            .participants-table tbody tr:hover {
                background: #f8fafc;
            }

            /* ===== EVENT CARDS (GRID) ===== */
            .events-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
                gap: 1.5rem;
                margin-top: 1.5rem;
            }

            .event-card {
                background: var(--white);
                border-radius: 12px;
                padding: 1.5rem;
                border: 1px solid #e2e8f0;
                transition: all 0.3s ease;
            }

            .event-card:hover {
                box-shadow: 0 8px 24px rgba(15, 23, 42, 0.1);
                transform: translateY(-4px);
            }

            .event-card-header {
                display: flex;
                justify-content: space-between;
                align-items: start;
                margin-bottom: 1rem;
            }

            .event-card-title {
                font-size: 1.25rem;
                color: var(--navy);
                margin: 0;
            }

            .event-meta {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 1rem;
                margin: 1rem 0;
                font-size: 0.9rem;
                color: var(--gray);
            }

            .event-meta-item {
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }

            .event-actions {
                display: flex;
                gap: 0.5rem;
                margin-top: 1rem;
                flex-wrap: wrap;
            }

            /* ===== RESERVATION CARDS ===== */
            .reservation-card {
                background: var(--white);
                border: 2px solid #e2e8f0;
                border-radius: 12px;
                padding: 1.5rem;
                margin-bottom: 1.5rem;
                transition: all 0.3s ease;
            }

            .reservation-card:hover {
                border-color: var(--gold);
                box-shadow: 0 4px 12px rgba(200, 168, 130, 0.15);
            }

            .reservation-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 1rem;
                padding-bottom: 1rem;
                border-bottom: 1px solid #e2e8f0;
            }

            .reservation-header h4 {
                margin: 0;
                color: var(--navy);
            }

            .reservation-info {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 1rem;
                font-size: 0.9375rem;
                color: var(--gray);
                margin-bottom: 1rem;
            }

            .reservation-info strong {
                color: var(--navy);
                display: block;
                font-weight: 600;
            }

            .reservation-actions {
                display: flex;
                gap: 0.5rem;
                margin-top: 1rem;
                flex-wrap: wrap;
            }

            /* ===== ALERTS ===== */
            .loading {
                text-align: center;
                padding: 4rem 2rem;
                font-size: 1.125rem;
                color: var(--gray);
            }

            .alert {
                padding: 1.25rem;
                border-radius: 10px;
                margin: 1rem 0;
                border-left: 4px solid;
            }

            .error {
                background: #fef2f2;
                color: #991b1b;
                border-color: #dc2626;
            }

            .success {
                background: #f0fdf4;
                color: #166534;
                border-color: #10b981;
            }

            .hidden {
                display: none;
            }

            .action-buttons {
                display: flex;
                gap: 0.5rem;
                flex-wrap: wrap;
            }

            /* ===== RESPONSIVE ===== */
            @media (max-width: 768px) {
                .container {
                    padding: 1rem;
                }

                .navbar-container {
                    padding: 1rem;
                }

                .dashboard-header h1 {
                    font-size: 1.75rem;
                }

                .form-grid {
                    grid-template-columns: 1fr;
                }

                .events-grid {
                    grid-template-columns: 1fr;
                }

                .card {
                    padding: 1.5rem;
                }

                .navbar-actions {
                    gap: 0.5rem;
                }

                .user-info {
                    display: none;
                }
            }
        </style>
        <style>
            /* ===== EDIT MODAL ===== */
            .modal {
                display: none;
                position: fixed;
                z-index: 2000;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.5);
                animation: fadeIn 0.3s ease;
            }

            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }

            .modal-content {
                background-color: var(--white);
                margin: 5% auto;
                padding: 2rem;
                border-radius: 16px;
                width: 90%;
                max-width: 500px;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
                animation: slideDown 0.3s ease;
            }

            @keyframes slideDown {
                from {
                    transform: translateY(-50px);
                    opacity: 0;
                }
                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }

            .modal-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 1.5rem;
                padding-bottom: 1rem;
                border-bottom: 2px solid rgba(200, 168, 130, 0.1);
            }

            .modal-header h2 {
                margin: 0;
                color: var(--navy);
                font-size: 1.5rem;
            }

            .close-btn {
                background: none;
                border: none;
                font-size: 1.5rem;
                cursor: pointer;
                color: var(--gray);
                transition: color 0.3s;
            }

            .close-btn:hover {
                color: var(--navy);
            }

            .modal-footer {
                display: flex;
                gap: 1rem;
                margin-top: 2rem;
                justify-content: flex-end;
            }

            /* ===== TOAST NOTIFICATION ===== */
            .toast {
                position: fixed;
                bottom: 2rem;
                right: 2rem;
                background: linear-gradient(135deg, #10b981 0%, #059669 100%);
                color: white;
                padding: 1.25rem 1.5rem;
                border-radius: 10px;
                box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
                z-index: 3000;
                animation: slideInUp 0.4s ease;
                max-width: 400px;
                display: flex;
                align-items: center;
                gap: 0.75rem;
            }

            @keyframes slideInUp {
                from {
                    transform: translateY(100px);
                    opacity: 0;
                }
                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }

            .toast.error {
                background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
                box-shadow: 0 8px 24px rgba(239, 68, 68, 0.3);
            }
        </style>
    </head>
    <body>
        <!-- Edit Reservation Modal -->
        <div id="editModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Edit Reservation</h2>
                    <button class="close-btn" onclick="closeEditModal()">&times;</button>
                </div>
                <div id="modal-error" class="alert error" style="display: none;"></div>
                <form id="edit-reservation-form">
                    <div class="form-group">
                        <label class="form-label" for="edit-res-name">Name *</label>
                        <input
                            type="text"
                            id="edit-res-name"
                            class="form-input"
                            placeholder="Full name"
                            required
                        />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="edit-res-email">Email *</label>
                        <input
                            type="email"
                            id="edit-res-email"
                            class="form-input"
                            placeholder="Email address"
                            required
                        />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="edit-res-phone">Phone *</label>
                        <input
                            type="tel"
                            id="edit-res-phone"
                            class="form-input"
                            placeholder="Phone number"
                            required
                        />
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="closeEditModal()">
                            Cancel
                        </button>
                        <button type="submit" class="btn btn-primary">
                            Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="navbar-container">
                <a href="home.html" class="navbar-logo">
                    <span class="logo-text">⭐ EVENTIZE</span>
                </a>
                <div class="navbar-actions">
                    <span class="user-info" id="user-info"></span>
                    <a href="booking.html" class="btn btn-secondary btn-small">Book</a>
                    <a href="index.html" class="btn btn-secondary btn-small">Events</a>
                    <button onclick="logout()" class="btn btn-small">Logout</button>
                </div>
            </div>
        </nav>

        <main class="container">
            <div id="loading" class="loading">
                Verifying authentication...
            </div>
            <div id="error" class="alert error" style="display: none"></div>

            <div id="admin-content" class="hidden">
                <!-- Dashboard Header -->
                <div class="dashboard-header">
                    <h1>Admin Dashboard</h1>
                    <p>Manage your events and reservations with ease</p>
                </div>

                <!-- Tabs -->
                <div class="tabs-container">
                    <button
                        class="tab-btn active"
                        onclick="switchTab('create')"
                    >
                        Create Event
                    </button>
                    <button class="tab-btn" onclick="switchTab('manage')">
                        Manage Events
                    </button>
                    <button class="tab-btn" onclick="switchTab('reservations')">
                        Reservations
                    </button>
                </div>

                <!-- Tab 1: Create Event -->
                <div id="create" class="tab-content active">
                    <div class="card">
                        <div class="card-header">
                            <h2>Create New Event</h2>
                        </div>
                        <div
                            id="create-event-error"
                            class="alert error"
                            style="display: none"
                        ></div>
                        <div
                            id="create-event-success"
                            class="alert success"
                            style="display: none"
                        ></div>

                        <form id="create-event-form">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label class="form-label" for="event-title"
                                        >Event Title *</label
                                    >
                                    <input
                                        type="text"
                                        id="event-title"
                                        name="title"
                                        class="form-input"
                                        placeholder="Enter event name"
                                        required
                                    />
                                </div>
                                <div class="form-group">
                                    <label
                                        class="form-label"
                                        for="event-location"
                                        >Location *</label
                                    >
                                    <input
                                        type="text"
                                        id="event-location"
                                        name="location"
                                        class="form-input"
                                        placeholder="City, Venue"
                                        required
                                    />
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="event-date"
                                        >Date & Time *</label
                                    >
                                    <input
                                        type="datetime-local"
                                        id="event-date"
                                        name="date"
                                        class="form-input"
                                        required
                                    />
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="event-seats"
                                        >Available Seats *</label
                                    >
                                    <input
                                        type="number"
                                        id="event-seats"
                                        name="seats"
                                        class="form-input"
                                        min="1"
                                        placeholder="How many seats?"
                                        required
                                    />
                                </div>
                            </div>
                            <div class="form-group">
                                <label
                                    class="form-label"
                                    for="event-description"
                                    >Description *</label
                                >
                                <textarea
                                    id="event-description"
                                    name="description"
                                    class="form-input"
                                    rows="4"
                                    placeholder="Tell us about your event..."
                                    required
                                ></textarea>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="event-image"
                                    >Image URL (optional)</label
                                >
                                <input
                                    type="url"
                                    id="event-image"
                                    name="image"
                                    class="form-input"
                                    placeholder="https://example.com/image.jpg"
                                />
                            </div>
                            <button type="submit" class="btn btn-primary">
                                Create Event
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Tab 2: Manage Events -->
                <div id="manage" class="tab-content">
                    <div class="card">
                        <div class="card-header">
                            <h2>Events Management</h2>
                        </div>
                        <div
                            id="events-error"
                            class="alert error"
                            style="display: none"
                        ></div>
                        <div id="events-list"></div>
                    </div>
                </div>

                <!-- Tab 3: Reservations -->
                <div id="reservations" class="tab-content">
                    <div class="card">
                        <div class="card-header">
                            <h2>Reservations Management</h2>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="event-select"
                                >Select Event</label
                            >
                            <select id="event-select" class="form-input">
                                <option value="">Choose an event...</option>
                            </select>
                        </div>
                        <div id="reservations-container"></div>
                        <div id="participants-list">
                            <p
                                style="
                                    color: var(--gray);
                                    text-align: center;
                                    padding: 2rem;
                                "
                            >
                                👆 Select an event above to view participants
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <script>
            let currentUser = null;
            let events = [];
            let currentEditingReservation = null; // Store current reservation being edited

            // Tab switching
            function switchTab(tabName) {
                // Hide all tabs
                document.querySelectorAll(".tab-content").forEach((tab) => {
                    tab.classList.remove("active");
                });
                document.querySelectorAll(".tab-btn").forEach((btn) => {
                    btn.classList.remove("active");
                });

                // Show selected tab
                document.getElementById(tabName).classList.add("active");
                event.target.classList.add("active");
            }

            // Modal functions
            function openEditModal() {
                document.getElementById("editModal").style.display = "block";
            }

            function closeEditModal() {
                document.getElementById("editModal").style.display = "none";
                document.getElementById("edit-reservation-form").reset();
                document.getElementById("modal-error").style.display = "none";
                currentEditingReservation = null;
            }

            // Toast notification function
            function showToast(message, isError = false) {
                const toast = document.createElement("div");
                toast.className = `toast ${isError ? "error" : ""}`;
                toast.innerHTML = `
                    <span>${isError ? "❌" : "✅"}</span>
                    <span>${message}</span>
                `;
                document.body.appendChild(toast);

                // Auto remove after 4 seconds
                setTimeout(() => {
                    toast.style.animation = "slideInUp 0.4s ease reverse";
                    setTimeout(() => toast.remove(), 400);
                }, 4000);
            }

            // Close modal when clicking outside
            window.onclick = function(event) {
                const modal = document.getElementById("editModal");
                if (event.target === modal) {
                    closeEditModal();
                }
            }

            // Authenticated fetch function
            async function authFetch(url, options = {}) {
                const token = localStorage.getItem("token");
                if (!token) {
                    throw new Error("Not authenticated");
                }

                const defaultOptions = {
                    headers: {
                        "Content-Type": "application/json",
                        Authorization: `Bearer ${token}`,
                    },
                };

                const response = await fetch(url, {
                    ...defaultOptions,
                    ...options,
                    headers: { ...defaultOptions.headers, ...options.headers },
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        logout();
                    }
                    throw new Error(`API Error: ${response.status}`);
                }

                return response.json();
            }

            // Check authentication
            async function checkAuth() {
                const user = localStorage.getItem("user");
                const token = localStorage.getItem("token");

                if (!user || !token) {
                    window.location.href = "login.html";
                    return;
                }

                try {
                    currentUser = JSON.parse(user);
                    document.getElementById("loading").style.display = "none";
                    document
                        .getElementById("admin-content")
                        .classList.remove("hidden");
                    document.getElementById("user-info").textContent =
                        `${currentUser.email}`;
                    await loadEvents(); // Wait for events to load first
                } catch (error) {
                    console.error("Error:", error);
                    window.location.href = "login.html";
                }
            }

            // Load events
            async function loadEvents() {
                try {
                    const data = await authFetch("/api/events");
                    events = data;

                    // Reservation counts are now included in the API response
                    displayEventsTable();
                    loadEventSelect();
                } catch (error) {
                    console.error("Error loading events:", error);
                    document.getElementById("events-error").style.display =
                        "block";
                    document.getElementById("events-error").textContent =
                        "Failed to load events";
                }
            }


            // Display events table
            function displayEventsTable() {
                const container = document.getElementById("events-list");

                if (events.length === 0) {
                    container.innerHTML = `
                    <div style="text-align: center; padding: 2rem; color: var(--gray);">
                        <p style="font-size: 1.1rem;">No events yet</p>
                        <p>Create your first event using the "Create Event" tab</p>
                    </div>
                `;
                    return;
                }

                const eventsHTML = `
                <div class="events-grid">
                    ${events
                        .map(
                            (event) => `
                        <div class="event-card">
                            <div class="event-card-header">
                                <h3 class="event-card-title">${escapeHtml(event.title)}</h3>
                            </div>
                            <div class="event-meta">
                                <div class="event-meta-item">${escapeHtml(event.location)}</div>
                                <div class="event-meta-item">${new Date(event.date).toLocaleDateString()}</div>
                                <div class="event-meta-item">${event.seats} seats</div>
                                <div class="event-meta-item">${event.reservationCount || 0} bookings</div>
                            </div>
                            <p style="color: var(--gray); font-size: 0.9rem; line-height: 1.4;">
                                ${escapeHtml(event.description).substring(0, 100)}...
                            </p>
                            <div class="event-actions">
                                <button class="btn btn-small" onclick="editEvent(${event.id})">
                                    Edit
                                </button>
                                <button class="btn btn-danger btn-small" onclick="deleteEvent(${event.id})">
                                    Delete
                                </button>
                            </div>
                        </div>
                    `,
                        )
                        .join("")}
                </div>
            `;

                container.innerHTML = eventsHTML;
            }

            // Load event select dropdown
            async function loadEventSelect() {
                const select = document.getElementById("event-select");
                const options = events
                    .map(
                        (event) => `
                <option value="${event.id}">${escapeHtml(event.title)} - ${new Date(event.date).toLocaleDateString()}</option>
            `,
                    )
                    .join("");

                select.innerHTML = `
                <option value="">Choose an event...</option>
                ${options}
            `;

                select.onchange = () => {
                    if (select.value) {
                        loadReservations();
                    }
                };
            }

            // Load reservations
            async function loadReservations() {
                const eventId = document.getElementById("event-select").value;

                if (!eventId) {
                    document.getElementById("participants-list").innerHTML =
                        '<p style="color: var(--gray); text-align: center; padding: 2rem;">Select an event above to view participants</p>';
                    document.getElementById(
                        "reservations-container",
                    ).innerHTML = "";
                    return;
                }

                try {
                    const data = await authFetch(
                        `/api/admin/events/${eventId}/reservations`,
                    );

                    if (!data || data.length === 0) {
                        document.getElementById("participants-list").innerHTML =
                            '<p style="color: var(--gray); text-align: center; padding: 2rem;">No reservations yet</p>';
                        document.getElementById(
                            "reservations-container",
                        ).innerHTML = "";
                        return;
                    }

                    displayReservations(data);
                } catch (error) {
                    console.error("Error loading reservations:", error);
                    document.getElementById("participants-list").innerHTML =
                        '<p style="color: var(--danger);">Failed to load reservations</p>';
                }
            }

            // Display reservations
            function displayReservations(reservations) {
                const container = document.getElementById(
                    "reservations-container",
                );

                const reservationsHTML = reservations
                    .map(
                        (res) => `
                <div class="reservation-card">
                    <div class="reservation-header">
                        <h4>${escapeHtml(res.name)}</h4>
                        <div style="color: var(--gray); font-size: 0.85rem;">
                            ${new Date(res.created_at).toLocaleDateString()}
                        </div>
                    </div>
                    <div class="reservation-info">
                        <div>
                            <strong>Email</strong>
                            ${escapeHtml(res.email)}
                        </div>
                        <div>
                            <strong>Phone</strong>
                            ${escapeHtml(res.phone)}
                        </div>
                    </div>
                    <div class="reservation-actions">
                        <button class="btn btn-small" onclick="editReservation(${res.id})">
                            Edit
                        </button>
                        <button class="btn btn-danger btn-small" onclick="deleteReservation(${res.id})">
                            Delete
                        </button>
                    </div>
                </div>
            `,
                    )
                    .join("");

                container.innerHTML = `
                <h3>Reservations (${reservations.length})</h3>
                ${reservationsHTML}
            `;
            }

            // Create/Update event form
            document
                .getElementById("create-event-form")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();

                    const eventId = document.getElementById(
                        "create-event-form"
                    ).dataset.eventId;
                    const isUpdate = !!eventId;

                    const formData = {
                        title: document.getElementById("event-title").value,
                        location:
                            document.getElementById("event-location").value,
                        date: document.getElementById("event-date").value,
                        seats: parseInt(
                            document.getElementById("event-seats").value,
                        ),
                        description:
                            document.getElementById("event-description").value,
                        image:
                            document.getElementById("event-image").value ||
                            null,
                    };

                    try {
                        if (isUpdate) {
                            // Update existing event
                            await authFetch(`/api/events/${eventId}`, {
                                method: "PUT",
                                body: JSON.stringify(formData),
                            });

                            document.getElementById(
                                "create-event-success",
                            ).style.display = "block";
                            document.getElementById(
                                "create-event-success",
                            ).textContent =
                                "Event updated successfully!";
                        } else {
                            // Create new event
                            const data = await authFetch("/api/events", {
                                method: "POST",
                                body: JSON.stringify(formData),
                            });

                            document.getElementById(
                                "create-event-success",
                            ).style.display = "block";
                            document.getElementById(
                                "create-event-success",
                            ).textContent =
                                "Event created successfully!";
                        }

                        document.getElementById("create-event-form").reset();
                        delete document.getElementById("create-event-form")
                            .dataset.eventId;

                        // Reset form UI to create mode
                        document.querySelector(".card-header .card-icon").textContent = "";
                        document.querySelector(".card h2").textContent = "Create New Event";
                        const submitBtn = document.getElementById("create-event-form").querySelector("button[type='submit']");
                        submitBtn.innerHTML = 'Create Event';

                        setTimeout(() => {
                            document.getElementById(
                                "create-event-success",
                            ).style.display = "none";
                            loadEvents();
                        }, 2000);
                    } catch (error) {
                        console.error("Error:", error);
                        document.getElementById(
                            "create-event-error",
                        ).style.display = "block";
                        document.getElementById(
                            "create-event-error",
                        ).textContent = isUpdate
                            ? "Failed to update event"
                            : "Failed to create event";
                    }
                });

            // Edit event
            async function editEvent(eventId) {
                const event = events.find((e) => e.id === eventId);
                if (!event) return;

                // Populate form fields
                document.getElementById("event-title").value = event.title;
                document.getElementById("event-location").value =
                    event.location;
                document.getElementById("event-date").value = event.date.slice(
                    0,
                    16,
                );
                // Handle both 'seats' and 'availableSeats' property names
                document.getElementById("event-seats").value =
                    event.seats || event.availableSeats;
                document.getElementById("event-description").value =
                    event.description;
                document.getElementById("event-image").value =
                    event.image || "";

                // Mark form as editing
                const form = document.getElementById("create-event-form");
                form.dataset.eventId = eventId;

                // Update form UI for edit mode
                document.querySelector(".card-header .card-icon").textContent = "";
                document.querySelector(".card h2").textContent = "Update Event";
                const submitBtn = form.querySelector("button[type='submit']");
                submitBtn.innerHTML = 'Update Event';

                // Scroll to create tab and switch to it
                switchTab("create");

                // Scroll the form into view
                document
                    .querySelector(".tab-content.active")
                    .scrollIntoView({ behavior: "smooth" });
            }

            // Delete event
            async function deleteEvent(eventId) {
                if (!confirm("Are you sure you want to delete this event?"))
                    return;

                try {
                    await authFetch(`/api/events/${eventId}`, {
                        method: "DELETE",
                    });
                    showToast("Event deleted successfully!");
                    loadEvents();
                } catch (error) {
                    console.error("Error deleting event:", error);
                    showToast("Failed to delete event", true);
                }
            }

            // Edit reservation
            async function editReservation(reservationId) {
                try {
                    // Load current reservations to find the one we're editing
                    const eventId = document.getElementById("event-select").value;
                    const reservations = await authFetch(
                        `/api/admin/events/${eventId}/reservations`
                    );

                    const reservation = reservations.find(
                        (r) => r.id === reservationId
                    );
                    if (!reservation) {
                        showToast("Reservation not found", true);
                        return;
                    }

                    // Populate modal with reservation data
                    currentEditingReservation = reservation;
                    document.getElementById("edit-res-name").value =
                        reservation.name;
                    document.getElementById("edit-res-email").value =
                        reservation.email;
                    document.getElementById("edit-res-phone").value =
                        reservation.phone;

                    openEditModal();
                } catch (error) {
                    console.error("Error loading reservation:", error);
                    showToast("Failed to load reservation", true);
                }
            }

            // Handle edit reservation form submission
            document
                .getElementById("edit-reservation-form")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();

                    if (!currentEditingReservation) {
                        showToast("No reservation selected", true);
                        return;
                    }

                    const formData = {
                        name: document.getElementById("edit-res-name").value,
                        email: document.getElementById("edit-res-email").value,
                        phone: document.getElementById("edit-res-phone").value,
                    };

                    try {
                        await authFetch(
                            `/api/admin/reservations/${currentEditingReservation.id}`,
                            {
                                method: "PUT",
                                body: JSON.stringify(formData),
                            }
                        );

                        closeEditModal();
                        await loadReservations(); // Refresh the reservation list
                        showToast("Reservation updated successfully!");
                    } catch (error) {
                        console.error("Error updating reservation:", error);
                        document.getElementById("modal-error").style.display =
                            "block";
                        document.getElementById("modal-error").textContent =
                            "❌ Failed to update reservation. Please try again.";
                        showToast("Failed to update reservation", true);
                    }
                });

            // Delete reservation
            async function deleteReservation(reservationId) {
                if (!confirm("Are you sure?")) return;

                try {
                    await authFetch(
                        `/api/admin/reservations/${reservationId}`,
                        {
                            method: "DELETE",
                        },
                    );
                    showToast("Reservation deleted successfully!");
                    loadReservations();
                } catch (error) {
                    console.error("Error deleting reservation:", error);
                    showToast("Failed to delete reservation", true);
                }
            }

            // Logout
            function logout() {
                if (confirm("Are you sure you want to logout?")) {
                    localStorage.removeItem("token");
                    localStorage.removeItem("user");
                    window.location.href = "login.html";
                }
            }

            // Utility function
            function escapeHtml(text) {
                const div = document.createElement("div");
                div.textContent = text;
                return div.innerHTML;
            }

            // Show success message
            function showSuccess(elementId, message) {
                const element = document.getElementById(elementId);
                if (element) {
                    element.textContent = message;
                    element.style.display = "block";
                    setTimeout(() => {
                        element.style.display = "none";
                    }, 5000);
                }
            }

            // Initialize
            window.addEventListener("DOMContentLoaded", checkAuth);
        </script>
    </body>
</html>
