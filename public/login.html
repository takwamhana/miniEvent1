<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Event - Connexion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            margin: 20px;
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .login-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            opacity: 0.9;
        }

        .login-body {
            padding: 2rem;
        }

        .tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 1px solid #e9ecef;
        }

        .tab {
            flex: 1;
            padding: 1rem;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #333;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            background: #667eea;
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 1rem;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 1rem;
        }

        .info {
            background: #d1ecf1;
            color: #0c5460;
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .back-link {
            text-align: center;
            margin-top: 2rem;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .webauthn-info {
            background: #e7f3ff;
            border: 1px solid #b3d9ff;
            border-radius: 5px;
            padding: 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Mini Event</h1>
            <p>Connexion sécurisée avec Passkey</p>
        </div>

        <div class="login-body">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Connexion</button>
                <button class="tab" onclick="switchTab('register')">Inscription</button>
            </div>

            <!-- Login Tab -->
            <div id="login-tab" class="tab-content active">
                <div class="webauthn-info">
                    🔐 Utilisez votre empreinte digitale, Face ID ou votre clé de sécurité pour vous connecter en toute sécurité.
                </div>
                
                <div id="login-error" class="error" style="display: none;"></div>
                <div id="login-success" class="success" style="display: none;"></div>

                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label" for="login-email">Email</label>
                        <input type="email" id="login-email" name="email" class="form-input" required>
                    </div>
                    <button type="submit" class="btn" id="login-btn">
                        Se connecter avec Passkey
                    </button>
                </form>
            </div>

            <!-- Register Tab -->
            <div id="register-tab" class="tab-content">
                <div class="webauthn-info">
                    🔐 Créez un compte sécurisé en utilisant votre empreinte digitale, Face ID ou votre clé de sécurité.
                </div>
                
                <div id="register-error" class="error" style="display: none;"></div>
                <div id="register-success" class="success" style="display: none;"></div>

                <form id="register-form">
                    <div class="form-group">
                        <label class="form-label" for="register-email">Email</label>
                        <input type="email" id="register-email" name="email" class="form-input" required>
                    </div>
                    <button type="submit" class="btn" id="register-btn">
                        Créer un compte avec Passkey
                    </button>
                </form>
            </div>

            <div class="back-link">
                <a href="index.html">← Retour à l'accueil</a>
            </div>
        </div>
    </div>

    <script>
        // Tab switching
        function switchTab(tabName) {
            // Remove active class from all tabs and contents
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            // Add active class to selected tab and content
            if (tabName === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('login-tab').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('register-tab').classList.add('active');
            }
        }

        // Show error message
        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.style.display = 'block';
            setTimeout(() => {
                element.style.display = 'none';
            }, 5000);
        }

        // Show success message
        function showSuccess(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.style.display = 'block';
        }

        // Set loading state
        function setLoading(buttonId, loading) {
            const button = document.getElementById(buttonId);
            if (loading) {
                button.disabled = true;
                button.innerHTML = '<span class="loading"></span>Connexion en cours...';
            } else {
                button.disabled = false;
                button.innerHTML = buttonId === 'login-btn' ? 'Se connecter avec Passkey' : 'Créer un compte avec Passkey';
            }
        }

        // Mock WebAuthn functions (in a real app, these would use the WebAuthn API)
        async function mockWebAuthnRegistration(email) {
            // Simulate WebAuthn registration
            await new Promise(resolve => setTimeout(resolve, 2000));
            return {
                credentialId: 'mock-credential-id-' + Date.now(),
                publicKey: 'mock-public-key'
            };
        }

        async function mockWebAuthnLogin(email) {
            // Simulate WebAuthn login
            await new Promise(resolve => setTimeout(resolve, 2000));
            return {
                credentialId: 'mock-credential-id',
                assertion: 'mock-assertion'
            };
        }

        // Registration
        async function registerPasskey(e) {
            e.preventDefault();
            
            const email = document.getElementById('register-email').value;
            setLoading('register-btn', true);

            try {
                // Step 1: Get registration options
                const optionsResponse = await fetch('/api/auth/register/options', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email })
                });

                if (!optionsResponse.ok) {
                    throw new Error('Erreur lors de l\'obtention des options d\'inscription');
                }

                const options = await optionsResponse.json();

                // Step 2: Simulate WebAuthn registration
                const credential = await mockWebAuthnRegistration(email);

                // Step 3: Verify registration
                const verifyResponse = await fetch('/api/auth/register/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email,
                        credentialId: credential.credentialId,
                        publicKey: credential.publicKey,
                        ...credential
                    })
                });

                if (!verifyResponse.ok) {
                    throw new Error('Erreur lors de la vérification de l\'inscription');
                }

                const result = await verifyResponse.json();
                
                // Store tokens
                localStorage.setItem('token', result.token);
                localStorage.setItem('refresh_token', result.refresh_token);
                localStorage.setItem('user', JSON.stringify(result.user));

                showSuccess('register-success', 'Compte créé avec succès ! Redirection...');
                
                // Redirect to admin page if user is admin, otherwise to home
                setTimeout(() => {
                    if (result.user.roles.includes('ROLE_ADMIN')) {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 2000);

            } catch (error) {
                console.error('Registration error:', error);
                showError('register-error', error.message);
            } finally {
                setLoading('register-btn', false);
            }
        }

        // Login
        async function loginWithPasskey(e) {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            setLoading('login-btn', true);

            try {
                // Step 1: Get login options
                const optionsResponse = await fetch('/api/auth/login/options', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email })
                });

                if (!optionsResponse.ok) {
                    throw new Error('Erreur lors de l\'obtention des options de connexion');
                }

                const options = await optionsResponse.json();

                // Step 2: Simulate WebAuthn login
                const assertion = await mockWebAuthnLogin(email);

                // Step 3: Verify login
                const verifyResponse = await fetch('/api/auth/login/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email,
                        credentialId: assertion.credentialId,
                        assertion: assertion.assertion,
                        ...assertion
                    })
                });

                if (!verifyResponse.ok) {
                    throw new Error('Erreur lors de la vérification de la connexion');
                }

                const result = await verifyResponse.json();
                
                // Store tokens
                localStorage.setItem('token', result.token);
                localStorage.setItem('refresh_token', result.refresh_token);
                localStorage.setItem('user', JSON.stringify(result.user));

                showSuccess('login-success', 'Connexion réussie ! Redirection...');
                
                // Redirect to admin page if user is admin, otherwise to home
                setTimeout(() => {
                    if (result.user.roles.includes('ROLE_ADMIN')) {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 2000);

            } catch (error) {
                console.error('Login error:', error);
                showError('login-error', error.message);
            } finally {
                setLoading('login-btn', false);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('register-form').addEventListener('submit', registerPasskey);
            document.getElementById('login-form').addEventListener('submit', loginWithPasskey);
        });
    </script>
</body>
</html>
