<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Eventize - Login</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            :root {
                --navy: #0f172a;
                --navy-light: #1e293b;
                --gold: #c8a882;
                --cream: #faf8f5;
                --gray: #64748b;
                --white: #ffffff;
                --teal: #4a9b7f;
            }

            body {
                font-family: "Inter", sans-serif;
                background: var(--cream);
                color: var(--navy);
                line-height: 1.6;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }

            /* Navigation */
            .navbar {
                background: linear-gradient(135deg, var(--cream) 0%, #faf8f5 100%);
                padding: 1.5rem 2rem;
                display: flex;
                justify-content: space-between;
                align-items: center;
                position: sticky;
                top: 0;
                z-index: 1000;
                border-bottom: 1px solid rgba(15, 23, 42, 0.08);
            }

            .logo-container {
                font-family: 'Playfair Display', serif;
                font-size: 1.5rem;
                font-weight: 700;
                color: var(--navy);
                text-decoration: none;
                letter-spacing: 1px;
            }

            .nav-links {
                display: flex;
                gap: 3rem;
                align-items: center;
            }

            .nav-link {
                color: var(--gray);
                text-decoration: none;
                font-weight: 500;
                font-size: 0.95rem;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                transition: color 0.3s;
            }

            .nav-link:hover {
                color: var(--teal);
            }

            /* Login Container */
            .login-wrapper {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 3rem 2rem;
            }

            .login-container {
                background: rgba(255, 255, 255, 0.7);
                backdrop-filter: blur(20px);
                border-radius: 24px;
                box-shadow: 0 20px 60px rgba(15, 23, 42, 0.1);
                overflow: hidden;
                width: 100%;
                max-width: 480px;
                border: 1px solid rgba(255, 255, 255, 0.8);
            }

            .login-header {
                background: linear-gradient(
                    135deg,
                    var(--navy) 0%,
                    var(--navy-light) 100%
                );
                color: white;
                padding: 2.5rem;
                text-align: center;
            }

            .login-header h1 {
                font-family: "Playfair Display", serif;
                font-size: 2rem;
                margin-bottom: 0.5rem;
                font-weight: 700;
            }

            .login-header p {
                opacity: 0.9;
                font-size: 0.95rem;
            }

            .login-body {
                padding: 2.5rem;
            }

            .tabs {
                display: flex;
                margin-bottom: 2rem;
                border-bottom: 2px solid rgba(15, 23, 42, 0.1);
            }

            .tab {
                flex: 1;
                padding: 1rem;
                background: none;
                border: none;
                cursor: pointer;
                font-size: 1rem;
                font-weight: 600;
                color: var(--gray);
                transition: all 0.3s ease;
                border-bottom: 3px solid transparent;
                margin-bottom: -2px;
            }

            .tab.active {
                color: var(--navy);
                border-bottom-color: var(--gold);
            }

            .tab-content {
                display: none;
            }

            .tab-content.active {
                display: block;
            }

            .form-group {
                margin-bottom: 1.5rem;
            }

            .form-label {
                display: block;
                margin-bottom: 0.5rem;
                font-weight: 500;
                color: var(--navy);
                font-size: 0.95rem;
            }

            .form-input {
                width: 100%;
                padding: 0.875rem 1rem;
                border: 2px solid rgba(15, 23, 42, 0.1);
                border-radius: 12px;
                font-size: 1rem;
                transition: all 0.3s;
                background: var(--white);
            }

            .form-input:focus {
                outline: none;
                border-color: var(--gold);
                box-shadow: 0 0 0 3px rgba(200, 168, 130, 0.1);
            }

            .btn {
                width: 100%;
                padding: 1rem;
                background: var(--navy);
                color: var(--white);
                text-decoration: none;
                border: none;
                border-radius: 12px;
                font-size: 1rem;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s ease;
            }

            .btn:hover {
                background: var(--navy-light);
                transform: translateY(-2px);
                box-shadow: 0 8px 20px rgba(15, 23, 42, 0.2);
            }

            .btn:disabled {
                background: var(--gray);
                cursor: not-allowed;
                transform: none;
            }

            .error {
                background: rgba(220, 53, 69, 0.1);
                color: #dc3545;
                padding: 1rem;
                border-radius: 12px;
                margin-bottom: 1rem;
                font-size: 0.9rem;
            }

            .success {
                background: rgba(40, 167, 69, 0.1);
                color: #28a745;
                padding: 1rem;
                border-radius: 12px;
                margin-bottom: 1rem;
                font-size: 0.9rem;
            }

            .info {
                background: rgba(200, 168, 130, 0.1);
                border: 1px solid rgba(200, 168, 130, 0.3);
                color: var(--navy);
                padding: 1rem;
                border-radius: 12px;
                margin-bottom: 1.5rem;
                font-size: 0.9rem;
                display: flex;
                align-items: start;
                gap: 0.75rem;
            }

            .back-link {
                text-align: center;
                margin-top: 2rem;
            }

            .back-link a {
                color: var(--navy);
                text-decoration: none;
                font-weight: 500;
                transition: color 0.3s;
            }

            .back-link a:hover {
                color: var(--gold);
            }

            .loading {
                display: inline-block;
                width: 18px;
                height: 18px;
                border: 3px solid rgba(255, 255, 255, 0.3);
                border-top: 3px solid var(--white);
                border-radius: 50%;
                animation: spin 1s linear infinite;
                margin-right: 10px;
                vertical-align: middle;
            }

            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body>
        <!-- Navigation -->
        <nav class="navbar">
            <a href="home.html" class="logo-container">⭐ EVENTIZE</a>
            <div class="nav-links">
                <a href="home.html" class="nav-link">Home</a>
                <a href="index.html" class="nav-link">Events</a>
                <a href="booking.html" class="nav-link">Book</a>
            </div>
        </nav>

        <div class="login-wrapper">
            <div class="login-container">
                <div class="login-header">
                    <h1>Welcome Back</h1>
                    <p>Secure authentication with Passkey</p>
                </div>

                <div class="login-body">
                    <!-- Login Tab -->
                    <div id="login-tab" class="tab-content active">
                        <div class="info">
                            <svg
                                width="20"
                                height="20"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <rect
                                    x="3"
                                    y="11"
                                    width="18"
                                    height="11"
                                    rx="2"
                                    ry="2"
                                ></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <span
                                >Use your fingerprint, Face ID, or security key
                                to login securely.</span
                            >
                        </div>

                        <div
                            id="login-error"
                            class="error"
                            style="display: none"
                        ></div>
                        <div
                            id="login-success"
                            class="success"
                            style="display: none"
                        ></div>

                        <form id="login-form">
                            <div class="form-group">
                                <label class="form-label" for="login-email"
                                    >Email</label
                                >
                                <input
                                    type="email"
                                    id="login-email"
                                    name="email"
                                    class="form-input"
                                    required
                                    placeholder="you@example.com"
                                />
                            </div>
                            <button type="submit" class="btn" id="login-btn">
                                Login with Passkey
                            </button>
                        </form>
                    </div>

                    <div class="back-link">
                        <a href="index.html">← Back to Events</a>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // Show error message
            function showError(elementId, message) {
                const element = document.getElementById(elementId);
                element.textContent = message;
                element.style.display = "block";
                setTimeout(() => {
                    element.style.display = "none";
                }, 5000);
            }

            // Show success message
            function showSuccess(elementId, message) {
                const element = document.getElementById(elementId);
                element.textContent = message;
                element.style.display = "block";
            }

            // Set loading state
            function setLoading(buttonId, loading) {
                const button = document.getElementById(buttonId);
                if (loading) {
                    button.disabled = true;
                    button.innerHTML =
                        '<span class="loading"></span>Connecting...';
                } else {
                    button.disabled = false;
                    button.innerHTML = "Login with Passkey";
                }
            }

            // Mock WebAuthn functions (in a real app, these would use the WebAuthn API)
            async function mockWebAuthnLogin(email) {
                // Simulate WebAuthn login
                await new Promise((resolve) => setTimeout(resolve, 2000));
                return {
                    credentialId: "mock-credential-id",
                    assertion: "mock-assertion",
                };
            }

            // Login
            async function loginWithPasskey(e) {
                e.preventDefault();

                const email = document.getElementById("login-email").value;
                setLoading("login-btn", true);

                try {
                    // Step 1: Get login options
                    const optionsResponse = await fetch(
                        "/api/auth/login/options",
                        {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify({ email }),
                        },
                    );

                    if (!optionsResponse.ok) {
                        throw new Error(
                            "Error getting login options",
                        );
                    }

                    const options = await optionsResponse.json();

                    // Step 2: Simulate WebAuthn login
                    const assertion = await mockWebAuthnLogin(email);

                    // Step 3: Verify login
                    const verifyResponse = await fetch(
                        "/api/auth/login/verify",
                        {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify({
                                email,
                                credentialId: assertion.credentialId,
                                assertion: assertion.assertion,
                                ...assertion,
                            }),
                        },
                    );

                    if (!verifyResponse.ok) {
                        throw new Error(
                            "Error verifying login",
                        );
                    }

                    const result = await verifyResponse.json();

                    // Store tokens
                    localStorage.setItem("token", result.token);
                    localStorage.setItem("refresh_token", result.refresh_token);
                    localStorage.setItem("user", JSON.stringify(result.user));

                    showSuccess(
                        "login-success",
                        "Login successful! Redirecting...",
                    );

                    // Redirect to admin page if user is admin, otherwise to home
                    setTimeout(() => {
                        if (result.user.roles.includes("ROLE_ADMIN")) {
                            window.location.href = "admin.html";
                        } else {
                            window.location.href = "index.html";
                        }
                    }, 2000);
                } catch (error) {
                    console.error("Login error:", error);
                    showError("login-error", error.message);
                } finally {
                    setLoading("login-btn", false);
                }
            }

            // Initialize
            document.addEventListener("DOMContentLoaded", () => {
                document
                    .getElementById("login-form")
                    .addEventListener("submit", loginWithPasskey);
            });
        </script>
    </body>
</html>
