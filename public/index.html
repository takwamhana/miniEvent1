<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Event - Accueil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f8f9fa;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }

        header h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        header p {
            text-align: center;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .event-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .event-card:hover {
            transform: translateY(-5px);
        }

        .event-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }

        .event-content {
            padding: 1.5rem;
        }

        .event-title {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .event-date {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .event-location {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .event-seats {
            background: #e9ecef;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            font-size: 1.2rem;
            color: #666;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 1rem;
            border-radius: 5px;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Mini Event</h1>
            <p>Découvrez et réservez des événements près de chez vous</p>
            <div class="nav-buttons">
                <a href="login.html" class="btn">Connexion</a>
                <a href="admin.html" class="btn btn-primary">Administration</a>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="loading" class="loading">Chargement des événements...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="events-container" class="events-grid"></div>
    </main>

    <script>
        async function loadEvents() {
            try {
                const response = await fetch('/api/events');
                
                if (!response.ok) {
                    throw new Error('Erreur lors du chargement des événements');
                }
                
                const events = await response.json();
                displayEvents(events);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = error.message;
            }
        }

        function displayEvents(events) {
            const container = document.getElementById('events-container');
            const loading = document.getElementById('loading');
            
            loading.style.display = 'none';
            
            if (events.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #666;">Aucun événement disponible pour le moment.</p>';
                return;
            }
            
            container.innerHTML = events.map(event => `
                <div class="event-card">
                    <div class="event-image">
                        ${event.image ? `<img src="${event.image}" alt="${event.title}" style="width: 100%; height: 100%; object-fit: cover;">` : '📅'}
                    </div>
                    <div class="event-content">
                        <h3 class="event-title">${event.title}</h3>
                        <p class="event-date">📅 ${new Date(event.date).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' })}</p>
                        <p class="event-location">📍 ${event.location}</p>
                        <div class="event-seats">
                            ${event.availableSeats} place${event.availableSeats > 1 ? 's' : ''} disponible${event.availableSeats > 1 ? 's' : ''}
                        </div>
                        <a href="event.html?id=${event.id}" class="btn" style="margin-top: 1rem; display: inline-block;">Voir les détails</a>
                    </div>
                </div>
            `).join('');
        }

        // Load events when page loads
        document.addEventListener('DOMContentLoaded', loadEvents);
    </script>
</body>
</html>
